<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Agenic Flow ABM Dashboard</title><link rel="stylesheet" href="dashboard.css"></head><body><header><div class="header-inner"><div class="logo"><span class="logo-main">Agenic Flow</span><span class="logo-sub">ABM Intelligence Dashboard</span></div><div class="header-status"><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></div></div></header><main><section class="panel" id="prospectsPanel"><div class="panel-header"><h2>🔥 Warm Prospects</h2><button class="btn-refresh" onclick="loadProspects()">↻ Refresh</button></div><div class="panel-meta" id="prospectsMeta">Loading...</div><div id="prospectsList" class="prospects-list"></div></section><section class="panel" id="campaignPanel"><div class="panel-header"><h2>🤖 ABM Campaign Generator</h2><span id="campaignStatus" class="campaign-status"></span></div><div id="campaignPlaceholder" class="campaign-placeholder"><p>Select a prospect to generate a personalized ABM campaign</p></div><div id="campaignOutput" class="campaign-output" style="display:none;"><div class="campaign-account" id="campaignAccount"></div><div class="campaign-text" id="campaignText"></div></div></section></main><section class="products-section"><div class="panel-header"><h2>📦 UrbanThread Product Catalog</h2><span id="productCount" class="badge"></span></div><div id="productGrid" class="product-grid"></div></section><footer><p>Agenic Flow Marketing · Autonomous ABM powered by PIM + AI · <a href="https://agenicflowmarketing.com" target="_blank">agenicflowmarketing.com</a> · <a href="https://github.com/andrewcofield-eng/pim-dam-crm-integration" target="_blank">GitHub</a></p></footer><script>var API="https://pim-dam-crm-integration-production.up.railway.app";var DIRECTUS="https://directus-production-9f53.up.railway.app";var directusToken=null;function setStatus(online){var dot=document.getElementById("statusDot");var text=document.getElementById("statusText");dot.className=online?"status-dot online":"status-dot offline";text.textContent=online?"System Online":"Connection Error";}function getDirectusToken(){return fetch(DIRECTUS+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:"admin@portfolio.com",password:"admin123"})}).then(function(res){return res.json();}).then(function(data){directusToken=data.data.access_token;setStatus(true);}).catch(function(){setStatus(false);});}function loadProspects(){document.getElementById("prospectsMeta").textContent="Loading...";document.getElementById("prospectsList").innerHTML="";fetch(API+"/abm/warm-prospects?directus_url="+DIRECTUS+"&directus_token="+directusToken).then(function(res){return res.json();}).then(function(data){document.getElementById("prospectsMeta").innerHTML="<strong>"+data.warm_prospects_count+" warm prospects identified</strong>";var list=document.getElementById("prospectsList");data.prospects.forEach(function(p,i){var card=document.createElement("div");card.className=i===0?"prospect-card hottest":"prospect-card";card.onclick=function(){selectProspect(p);};var rank=document.createElement("div");rank.className="prospect-rank";rank.textContent="#"+(i+1);var info=document.createElement("div");info.className="prospect-info";var name=document.createElement("div");name.className="prospect-name";name.textContent=p.company_name;var meta=document.createElement("div");meta.className="prospect-meta";meta.textContent=p.industry+" · "+p.buying_stage;var contact=document.createElement("div");contact.className="prospect-contact";contact.textContent="👤 "+p.contact.name+" — "+p.contact.title;info.appendChild(name);info.appendChild(meta);info.appendChild(contact);var scoreBox=document.createElement("div");scoreBox.className="prospect-score";var scoreNum=document.createElement("div");scoreNum.className="score-number";scoreNum.textContent=p.engagement_score;var scoreLabel=document.createElement("div");scoreLabel.className="score-label";scoreLabel.textContent="pts";scoreBox.appendChild(scoreNum);scoreBox.appendChild(scoreLabel);card.appendChild(rank);card.appendChild(info);card.appendChild(scoreBox);list.appendChild(card);});}).catch(function(){document.getElementById("prospectsMeta").textContent="Error loading prospects.";});}function selectProspect(prospect){document.querySelectorAll(".prospect-card").forEach(function(c){c.classList.remove("selected");});document.getElementById("campaignPlaceholder").style.display="none";document.getElementById("campaignOutput").style.display="block";var acct=document.getElementById("campaignAccount");acct.innerHTML="<strong>"+prospect.company_name+"</strong> · "+prospect.industry+"<br><small>Contact: "+prospect.contact.name+" ("+prospect.contact.title+")</small>";document.getElementById("campaignText").innerHTML="<div class=\"generating\">⚡ Generating personalized ABM campaign...</div>";document.getElementById("campaignStatus").textContent="Generating...";generateCampaign(prospect.account_id);}function generateCampaign(accountId){fetch(API+"/abm/campaign/generate?account_id="+accountId+"&directus_url="+DIRECTUS+"&directus_token="+directusToken,{method:"POST"}).then(function(res){return res.json();}).then(function(data){var lines=data.campaign.split("\n");var html="";lines.forEach(function(line){if(line.match(/^\d+\./)){html+="<h4>"+line+"</h4>";}else if(line.trim()===""){html+="<br>";}else{html+="<p>"+line+"</p>";}});document.getElementById("campaignText").innerHTML=html;document.getElementById("campaignStatus").textContent="✅ Campaign Ready";}).catch(function(){document.getElementById("campaignText").innerHTML="<p>Error generating campaign.</p>";document.getElementById("campaignStatus").textContent="❌ Error";});}function loadProducts(){fetch(API+"/products").then(function(res){return res.json();}).then(function(products){document.getElementById("productCount").textContent=products.length+" products";var grid=document.getElementById("productGrid");products.forEach(function(p){var card=document.createElement("div");card.className="product-card";var sku=document.createElement("div");sku.className="product-sku";sku.textContent=p.sku;var pname=document.createElement("div");pname.className="product-name";pname.textContent=p.product_name;var cat=document.createElement("div");cat.className="product-category";cat.textContent=p.category;var price=document.createElement("div");price.className="product-price";price.textContent="$"+parseFloat(p.price).toFixed(2);card.appendChild(sku);card.appendChild(pname);card.appendChild(cat);card.appendChild(price);grid.appendChild(card);});}).catch(function(e){console.error("Products error:",e);});}function init(){getDirectusToken().then(function(){loadProspects();loadProducts();});}init();</script></body></html>
