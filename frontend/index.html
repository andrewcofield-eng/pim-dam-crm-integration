<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenic Flow ABM Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><span class="logo-main">Agenic Flow</span></div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" style="font-size:0.82rem;color:var(--text-secondary);">Connecting...</span>
    </div>
  </div>
</header>

<main>
  <section class="panel">
    <div class="panel-header"><h2>Warm Prospects</h2><button class="btn-refresh" onclick="loadProspects()">Refresh</button></div>
    <div id="prospectsMeta"></div>
    <div id="prospectsList" class="prospect-list"></div>
  </section>

  <section class="panel">
    <div class="panel-header"><h2>AI Campaign Generator</h2></div>
    <div id="campaignPlaceholder" class="placeholder"><p>Select a prospect to generate personalized ABM campaign</p></div>
    <div id="campaignOutput" style="display:none;">
      <div id="campaignAccount" style="font-weight:700;margin-bottom:0.5rem;color:var(--accent-tan);"></div>
      <div id="campaignStatus" class="badge" style="margin-bottom:1rem;">Generating...</div>
      <div id="campaignText" style="max-height:400px;overflow-y:auto;background:var(--bg-dark);padding:1rem;border-radius:8px;"></div>
    </div>
  </section>
</main>

<section class="products-section" style="margin-top:0;">
  <div class="panel-header"><h2>Shopify Metrics</h2><button class="btn-refresh" onclick="loadShopifyChart()">Refresh</button></div>
  <div class="panel" style="max-width:100%">
    <canvas id="shopifyChart" height="80"></canvas>
    <div id="shopifyStatus" style="font-size:0.82rem;color:var(--text-secondary);margin-top:0.75rem;"></div>
  </div>
</section>

<section class="products-section" style="margin-top:0;">
  <div class="panel-header"><h2>Products</h2><span id="productCount" class="badge"></span></div>
  <div id="productGrid" class="product-grid"></div>
</section>

<footer><p>Agenic Flow Marketing</p></footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
var API = "https://pim-dam-crm-integration-production.up.railway.app";
var token = null;
var shopifyChartInstance = null;

function setStatus(online) {
  var dot = document.getElementById("statusDot");
  var txt = document.getElementById("statusText");
  if (online) {
    dot.className = "status-dot online";
    txt.textContent = "Connected";
  } else {
    dot.className = "status-dot offline";
    txt.textContent = "Disconnected";
  }
}

function getToken() {
  return fetch(API + "/auth/token")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      token = d.token;
      setStatus(true);
      return token;
    })
    .catch(function() {
      setStatus(false);
    });
}

function loadProspects() {
  if (!token) return;
  document.getElementById("prospectsMeta").textContent = "Loading...";
  
  var url = API + "/abm/warm-prospects?directus_url=https://directus-production-9f53.up.railway.app&directus_token=" + token;
  
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById("prospectsMeta").textContent = d.warm_prospects_count + " warm prospects";
      var list = document.getElementById("prospectsList");
      list.innerHTML = "";
      
      if (!d.prospects || d.prospects.length === 0) {
        list.innerHTML = "<p style='color:var(--text-secondary);'>No warm prospects found</p>";
        return;
      }
      
      d.prospects.forEach(function(p) {
        var card = document.createElement("div");
        card.className = "prospect-card";
        card.innerHTML = "<div style='font-weight:600;'>" + p.company_name + "</div>" +
                        "<div style='font-size:0.8rem;color:var(--text-secondary);'>Score: " + p.engagement_score + "</div>";
        card.onclick = function() { selectProspect(p); };
        list.appendChild(card);
      });
    })
    .catch(function(e) {
      document.getElementById("prospectsMeta").textContent = "Error loading prospects";
    });
}

function selectProspect(p) {
  document.getElementById("campaignPlaceholder").style.display = "none";
  document.getElementById("campaignOutput").style.display = "block";
  document.getElementById("campaignAccount").textContent = p.company_name;
  document.getElementById("campaignStatus").textContent = "Generating...";
  document.getElementById("campaignText").textContent = "Loading...";
  
  var url = API + "/abm/campaign/generate?account_id=" + p.account_id + "&directus_url=https://directus-production-9f53.up.railway.app&directus_token=" + token;
  
  fetch(url, {method: "POST"})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var html = "<p><strong>Subject:</strong> " + (d.subject || "N/A") + "</p>" +
                 "<p><strong>Email Copy:</strong></p><p>" + (d.email_copy || "").replace(/\n/g, "<br>") + "</p>" +
                 "<hr style='margin:1rem 0;border-color:var(--border);'>" +
                 "<p><strong>Ad Headlines:</strong></p><ul>";
      if (d.ad_headlines) {
        d.ad_headlines.forEach(function(h) {
          html += "<li>" + h + "</li>";
        });
      }
      html += "</ul><p><strong>Landing Page Copy:</strong></p><p>" + (d.landing_page_copy || "").replace(/\n/g, "<br>") + "</p>";
      
      document.getElementById("campaignText").innerHTML = html;
      document.getElementById("campaignStatus").textContent = "Ready";
    })
    .catch(function(e) {
      document.getElementById("campaignText").innerHTML = "<p>Error generating campaign</p>";
      document.getElementById("campaignStatus").textContent = "Error";
    });
}

function loadShopifyChart() {
  document.getElementById("shopifyStatus").textContent = "Loading Shopify data...";
  
  fetch(API + "/ai-campaigns/shopify/status")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById("shopifyStatus").textContent = "Last updated: " + (d.updated_at || new Date().toLocaleTimeString());
      
      var metrics = d.metrics || d;
      var labels = [];
      var values = [];
      var colors = [];
      
      var colorMap = {
        revenue: "#00e676",
        orders: "#4d9fcc",
        new_customers: "#dd0000",
        returning_customers: "#a36214",
        vip_customers: "#612e00"
      };
      
      for (var key in metrics) {
        if (typeof metrics[key] === "number" && key !== "total_revenue") {
          labels.push(key.replace(/_/g, " "));
          values.push(metrics[key]);
          colors.push(colorMap[key] || "#4d9fcc");
        }
      }
      
      var ctx = document.getElementById("shopifyChart").getContext("2d");
      
      if (shopifyChartInstance) {
        shopifyChartInstance.destroy();
      }
      
      shopifyChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "Metrics",
            data: values,
            backgroundColor: colors,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: "#cce4f0" } }
          },
          scales: {
            x: { ticks: { color: "#cce4f0" }, grid: { color: "rgba(255,255,255,0.08)" } },
            y: { ticks: { color: "#cce4f0" }, grid: { color: "rgba(255,255,255,0.08)" } }
          }
        }
      });
    })
    .catch(function(e) {
      document.getElementById("shopifyStatus").textContent = "Failed: " + e;
    });
}

function loadProducts() {
  fetch(API + "/products")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var products = data.value || data.data || (Array.isArray(data) ? data : []);
      document.getElementById("productCount").textContent = products.length + " products";
      
      var grid = document.getElementById("productGrid");
      grid.innerHTML = "";
      
      if (products.length === 0) {
        grid.innerHTML = "<p style='color:var(--text-secondary);'>No products found</p>";
        return;
      }
      
      products.forEach(function(p) {
        var card = document.createElement("div");
        card.className = "product-card";
        
        var img = document.createElement("img");
        // CRITICAL FIX: Use full Cloudinary URL, not relative path
        var imageUrl = p.cloudinary_url;
        if (!imageUrl || imageUrl === "null" || imageUrl === "") {
          // Fallback to placeholder if no cloudinary_url
          imageUrl = "https://via.placeholder.com/200x200?text=" + encodeURIComponent(p.sku || "No+Image");
        }
        img.src = imageUrl;
        img.alt = p.product_name || p.sku;
        img.style.cssText = "width:100%;height:160px;object-fit:cover;border-radius:6px;margin-bottom:10px;";
        img.onerror = function() {
          this.src = "https://via.placeholder.com/200x200?text=" + encodeURIComponent(p.sku || "No+Image");
        };
        
        var sku = document.createElement("div");
        sku.className = "product-sku";
        sku.textContent = p.sku || "";
        
        var name = document.createElement("div");
        name.className = "product-name";
        name.textContent = p.product_name || "";
        
        var short = document.createElement("div");
        short.className = "product-short";
        short.textContent = p.short_description || "";
        short.style.cssText = "font-size:0.8rem;color:#666;margin-bottom:6px;";
        
        var price = document.createElement("div");
        price.className = "product-price";
        price.textContent = "$" + (parseFloat(p.price) || 0).toFixed(2);
        
        card.appendChild(img);
        card.appendChild(sku);
        card.appendChild(name);
        card.appendChild(short);
        card.appendChild(price);
        grid.appendChild(card);
      });
    })
    .catch(function(e) {
      document.getElementById("productCount").textContent = "Error";
      document.getElementById("productGrid").innerHTML = "<p style='color:var(--accent-warm);'>Failed to load products: " + e.message + "</p>";
    });
}

// Initialize
getToken().then(function() {
  loadProspects();
  loadProducts();
  loadShopifyChart();
});
</script>
</body>
</html>
